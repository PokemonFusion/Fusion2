<form id="exit-form" method="post"
    action="{% if exit %}{% url 'roomeditor:exit_edit' exit.id %}{% elif room %}{% url 'roomeditor:exit_new' room.id %}{% endif %}"
    {% if exit %}data-exit="{{ exit.id }}"{% endif %}
    class="needs-validation" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <div class="roomeditor-actions mt-2">
        <button class="btn btn-primary" type="submit">Save</button>
    </div>
</form>
