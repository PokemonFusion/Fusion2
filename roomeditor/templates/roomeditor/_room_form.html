<form id="room-form" method="post" action="{% url 'roomeditor:room_new' %}" class="needs-validation" novalidate>
    {% csrf_token %}
    <div class="form-grid">
      {{ form.as_p }}
    </div>
    <div class="roomeditor-actions mt-2">
        <button class="btn btn-primary" type="submit">Save</button>
    </div>
</form>
