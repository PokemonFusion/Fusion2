{% extends "webclient/base.html" %}
{% load static %}

{% block client %}

<div class="fusion-client-shell">
  <header class="fusion-client-topbar">
    <a class="fusion-client-brand" href="/" aria-label="Fusion2 home">
      <img src="{% static "website/images/fusion2/logo-fusion-core.svg" %}" alt="" width="34" height="34">
      <span>
        <strong>Fusion2 Webclient</strong>
        <small>Persistent Trainer RPG</small>
      </span>
    </a>

    <nav class="fusion-command-bar" aria-label="Quick commands">
      <div class="fusion-command-list">
        <button type="button" class="fusion-command-button" data-command="look">look</button>
        <button type="button" class="fusion-command-button" data-command="map">map</button>
        <button type="button" class="fusion-command-button" data-command="party">party</button>
        <button type="button" class="fusion-command-button" data-command="sheet">sheet</button>
        <button type="button" class="fusion-command-button" data-command="inventory">inventory</button>
        <button type="button" class="fusion-command-button" data-command="help">help</button>
      </div>
    </nav>

    <div class="fusion-client-controls">
      <div class="fusion-client-status" id="fusion-connection-status" data-state="connecting" aria-live="polite">
        <span class="fusion-status-light" aria-hidden="true"></span>
        <span class="fusion-status-label">connecting</span>
        <button type="button" id="fusion-reconnect" class="fusion-reconnect-button" hidden>Reconnect</button>
      </div>
      <div id="toolbar" class="fusion-client-toolbar" aria-label="Client tools"></div>
    </div>
  </header>

  <main class="fusion-client-stage" aria-label="Game output and command input">
    <div id="main" class="split split-vertical" data-role-default>
      <div id="main-sub" class="split-sub">
        <div id="messagewindow" aria-live="polite"></div>
      </div>
    </div>

    <div id="input" class="split split-vertical" data-role-input data-update-append>
      <div id="inputform" class="wrapper">
        <div id="prompt" class="prompt"></div>
        <div id="inputcontrol" class="input-group">
          <textarea id="inputfield" type="text" class="form-control" aria-label="Command input"></textarea>
          <span class="input-group-btn">
            <button class="btn btn-large btn-outline-primary" id="inputsend" type="button" value="" aria-label="Send command">&gt;</button>
          </span>
        </div>
      </div>
    </div>
  </main>
</div>

{% endblock %}

{% block scripts %}{% endblock %}
