<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Fusion Core Logo</title>
  <desc id="desc">Original compass-like fusion core mark for Fusion 2.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2C46D"/>
      <stop offset="1" stop-color="#B46A2B"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#88D6C4"/>
      <stop offset="1" stop-color="#0B5E62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2D2824" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <path d="M48 4 58.5 34.5 89 48 58.5 61.5 48 92 37.5 61.5 7 48 37.5 34.5Z" fill="url(#gold)" stroke="#2D2824" stroke-width="3" stroke-linejoin="round"/>
    <path d="M48 15 55 38 78 48 55 58 48 81 41 58 18 48 41 38Z" fill="#F7E9CC" stroke="#2D2824" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="48" cy="48" r="24" fill="#2D2824"/>
    <circle cx="48" cy="48" r="17" fill="url(#teal)" stroke="#F7E9CC" stroke-width="3"/>
    <circle cx="48" cy="48" r="7" fill="#F7E9CC"/>
    <path d="M48 31v7M48 58v7M31 48h7M58 48h7" stroke="#F7E9CC" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
